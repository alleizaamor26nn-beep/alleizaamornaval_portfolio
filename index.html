<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <title>Alleiza Amor | Ethereal Portfolio</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- animated gradient orb background -->
  <div class="gradient-orb"></div>
  <div class="gradient-orb-2"></div>
  
  <!-- custom cursor (desktop only effect) -->
  <div class="cursor-dot"></div>
  <div class="cursor-outline"></div>

  <header>
    <div class="nav-container">
      <div class="logo-wrapper">
        <h1 class="logo">Alleiza<span class="accent-dot">.</span></h1>
        <div class="logo-underline"></div>
      </div>
      <nav>
        <ul class="nav-links">
          <li><a href="index.html" class="active nav-item">Home</a></li>
          <li><a href="html/about.html" class="nav-item">About Me</a></li>
          <li><a href="html/photo.html" class="nav-item">Projects</a></li>
          <li><a href="html/contact.html" class="nav-item">Contact</a></li>
        </ul>
        <div class="menu-toggle" id="mobile-menu">
          <i class="fas fa-bars"></i>
        </div>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero-section">
      <div class="hero-grid">
        <!-- left image with morphing frame -->
        <div class="hero-image-wrapper">
          <div class="floating-frame">
            <div class="img-container">
              <img src="ako.jpg" alt="Alleiza Amor" class="hero-portrait">
            </div>
            <div class="glass-badge">
              <i class="fas fa-camera"></i> creative soul
            </div>
          </div>
          <div class="floating-shape shape-1"></div>
          <div class="floating-shape shape-2"></div>
        </div>

        <!-- right text content -->
        <div class="hero-content">
          <div class="greeting-tag">
            <span class="wave-emoji">✨</span> BSIT GRADUATE
          </div>
          <h1 class="glow-text"> <span class="highlight">Alleiza's</span> Portfolio<br></h1>
          <p class="hero-description">I'm Alleiza Amor | This is my project space</p>
          
          

          <div class="btn-group">
            <button class="btn-primary" id="exploreBtn">
              <span>Explore journey</span> <i class="fas fa-arrow-right"></i>
            </button>
            <button class="btn-outline" id="contactQuick">
              <i class="far fa-comment-dots"></i> Let's connect
            </button>
          </div>

          

      

  <footer>
    <div class="footer-content">
      <p>© 2025 Alleiza Amor — designed with <i class="fas fa-heart"></i> intuition & code</p>
    </div>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
